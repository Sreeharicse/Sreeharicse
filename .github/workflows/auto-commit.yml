name: Weekly Auto Commit

# Runs automatically every Sunday at 00:00 UTC.
# You can also trigger it manually anytime from the Actions tab.
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update timestamp file
        run: |
          mkdir -p .github/activity
          echo "Last automated update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .github/activity/last-update.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/activity/last-update.md
          git diff --staged --quiet || git commit -m "chore: weekly auto-update"
          git push
